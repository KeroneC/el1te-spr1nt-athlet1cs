name: Deploy Azure Demo

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Successful main CI run ID containing immutable release artifacts
        required: true
        type: string
      phase6b_acknowledged:
        description: Phase 6B and nonprofit grant usage are approved
        required: true
        type: boolean
        default: false
      infrastructure_only:
        description: Provision infrastructure only for the first SQL identity bootstrap pass
        required: true
        type: boolean
        default: true
      managed_identity_sql_ready:
        description: API managed identity exists as a contained Azure SQL user
        required: true
        type: boolean
        default: false
      bootstrap_admin:
        description: Run the idempotent first-SuperAdmin bootstrap command
        required: true
        type: boolean
        default: false

concurrency:
  group: deploy-azure-demo
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy:
    name: Promote verified release to demo
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: demo
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_DEPLOYMENT_PRINCIPAL_OBJECT_ID: ${{ vars.AZURE_DEPLOYMENT_PRINCIPAL_OBJECT_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      RESOURCE_NAME_PREFIX: ${{ vars.RESOURCE_NAME_PREFIX }}
      SQL_ADMIN_LOGIN: ${{ vars.SQL_ADMIN_LOGIN }}
      SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
      DATABASE_MIGRATION_CONNECTION_STRING: ${{ secrets.DATABASE_MIGRATION_CONNECTION_STRING }}
      BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
      BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
      BOOTSTRAP_ADMIN_FIRST_NAME: ${{ vars.BOOTSTRAP_ADMIN_FIRST_NAME }}
      BOOTSTRAP_ADMIN_LAST_NAME: ${{ vars.BOOTSTRAP_ADMIN_LAST_NAME }}
      BUDGET_CONTACT_EMAIL: ${{ vars.BUDGET_CONTACT_EMAIL }}

    steps:
      - name: Validate release request and configuration
        shell: bash
        run: |
          [[ "${{ inputs.phase6b_acknowledged }}" == "true" ]] || { echo "Phase 6B approval is required."; exit 1; }
          [[ "${{ inputs.infrastructure_only }}" == "true" || "${{ inputs.managed_identity_sql_ready }}" == "true" ]] || { echo "Full deployment requires SQL managed identity readiness."; exit 1; }
          required=(AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_DEPLOYMENT_PRINCIPAL_OBJECT_ID AZURE_RESOURCE_GROUP AZURE_LOCATION RESOURCE_NAME_PREFIX SQL_ADMIN_LOGIN SQL_ADMIN_PASSWORD BUDGET_CONTACT_EMAIL)
          for name in "${required[@]}"; do [[ -n "${!name}" ]] || { echo "Missing configuration: $name"; exit 1; }; done
          if [[ "${{ inputs.infrastructure_only }}" != "true" ]]; then
            [[ -n "$DATABASE_MIGRATION_CONNECTION_STRING" ]] || { echo "Missing migration connection string."; exit 1; }
          fi
          if [[ "${{ inputs.bootstrap_admin }}" == "true" ]]; then
            required_admin=(BOOTSTRAP_ADMIN_EMAIL BOOTSTRAP_ADMIN_PASSWORD BOOTSTRAP_ADMIN_FIRST_NAME BOOTSTRAP_ADMIN_LAST_NAME)
            for name in "${required_admin[@]}"; do [[ -n "${!name}" ]] || { echo "Missing admin bootstrap configuration: $name"; exit 1; }; done
          fi

      - name: Verify selected CI run
        id: release
        env: { GH_TOKEN: "${{ github.token }}" }
        shell: bash
        run: |
          run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/${{ inputs.ci_run_id }}")
          [[ "$(jq -r .conclusion <<< "$run")" == "success" ]] || { echo "CI run did not succeed."; exit 1; }
          [[ "$(jq -r .head_branch <<< "$run")" == "main" ]] || { echo "CI run is not from main."; exit 1; }
          [[ "$(jq -r .event <<< "$run")" == "push" ]] || { echo "CI run is not a main push."; exit 1; }
          sha=$(jq -r .head_sha <<< "$run")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exact release commit
        uses: actions/checkout@v7
        with: { ref: "${{ steps.release.outputs.sha }}" }

      - name: Download immutable release bundle
        if: ${{ ! inputs.infrastructure_only }}
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Verify artifact manifest and checksums
        if: ${{ ! inputs.infrastructure_only }}
        shell: bash
        run: |
          [[ "$(jq -r .commitSha release/manifest.json)" == "${{ steps.release.outputs.sha }}" ]] || { echo "Artifact SHA mismatch."; exit 1; }
          (cd release && sha256sum --check SHA256SUMS)

      - name: Authenticate to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate and preview infrastructure
        shell: bash
        run: |
          az bicep build --file infra/main.bicep
          az deployment group what-if --resource-group "$AZURE_RESOURCE_GROUP" --template-file infra/main.bicep \
            --parameters environmentName=demo location="$AZURE_LOCATION" namePrefix="$RESOURCE_NAME_PREFIX" \
              deploymentPrincipalObjectId="$AZURE_DEPLOYMENT_PRINCIPAL_OBJECT_ID" sqlAdminLogin="$SQL_ADMIN_LOGIN" sqlAdminPassword="$SQL_ADMIN_PASSWORD"

      - name: Apply infrastructure
        id: infrastructure
        shell: bash
        run: |
          outputs=$(az deployment group create --resource-group "$AZURE_RESOURCE_GROUP" --template-file infra/main.bicep \
            --parameters environmentName=demo location="$AZURE_LOCATION" namePrefix="$RESOURCE_NAME_PREFIX" \
              deploymentPrincipalObjectId="$AZURE_DEPLOYMENT_PRINCIPAL_OBJECT_ID" sqlAdminLogin="$SQL_ADMIN_LOGIN" sqlAdminPassword="$SQL_ADMIN_PASSWORD" \
              tags="{\"project\":\"el1te-platform\",\"environment\":\"demo\",\"funding\":\"nonprofit-grant\"}" \
            --query properties.outputs --output json)
          for key in apiUrl webUrl apiAppName webAppName sqlServerName sqlDatabaseName apiPrincipalId keyVaultName; do
            echo "$(tr '[:upper:]' '[:lower:]' <<< "$key")=$(jq -r ".${key}.value" <<< "$outputs")" >> "$GITHUB_OUTPUT"
          done

      - name: Initialize JWT secret when absent
        shell: bash
        run: |
          vault="${{ steps.infrastructure.outputs.keyvaultname }}"
          for attempt in {1..12}; do
            if az keyvault secret show --vault-name "$vault" --name jwt-signing-key --query value -o tsv > /tmp/jwt 2>/dev/null; then break; fi
            if [[ "$attempt" == "12" ]]; then
              key=$(openssl rand -base64 48)
              az keyvault secret set --vault-name "$vault" --name jwt-signing-key --value "$key" --output none
              printf '%s' "$key" > /tmp/jwt
              echo "::add-mask::$key"
            else sleep 10; fi
          done

      - name: Configure conservative monthly budget
        shell: bash
        run: |
          start=$(date -u +%Y-%m-01T00:00:00Z)
          end=$(date -u -d '+10 years' +%Y-%m-01T00:00:00Z)
          scope="/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$AZURE_RESOURCE_GROUP"
          body=$(jq -n --arg start "$start" --arg end "$end" --arg email "$BUDGET_CONTACT_EMAIL" '{properties:{category:"Cost",amount:125,timeGrain:"Monthly",timePeriod:{startDate:$start,endDate:$end},notifications:{Actual50:{enabled:true,operator:"GreaterThan",threshold:50,thresholdType:"Actual",contactEmails:[$email]},Actual75:{enabled:true,operator:"GreaterThan",threshold:75,thresholdType:"Actual",contactEmails:[$email]},Actual90:{enabled:true,operator:"GreaterThan",threshold:90,thresholdType:"Actual",contactEmails:[$email]},Actual100:{enabled:true,operator:"GreaterThan",threshold:100,thresholdType:"Actual",contactEmails:[$email]}}}}')
          az rest --method put --url "https://management.azure.com${scope}/providers/Microsoft.Consumption/budgets/el1te-demo-monthly?api-version=2024-08-01" --body "$body" --output none

      - name: Infrastructure bootstrap summary
        if: ${{ inputs.infrastructure_only }}
        run: |
          echo "## Demo infrastructure prepared" >> "$GITHUB_STEP_SUMMARY"
          echo "API principal: ${{ steps.infrastructure.outputs.apiprincipalid }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Database: ${{ steps.infrastructure.outputs.sqldatabasename }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Grant this identity least-privilege contained-user access, then run a full deployment." >> "$GITHUB_STEP_SUMMARY"

      - name: Allow migration runner SQL access
        if: ${{ ! inputs.infrastructure_only }}
        shell: bash
        run: |
          runner_ip=$(curl --fail --silent --show-error --max-time 10 https://api.ipify.org)
          az sql server firewall-rule create --resource-group "$AZURE_RESOURCE_GROUP" --server "${{ steps.infrastructure.outputs.sqlservername }}" \
            --name "github-actions-${GITHUB_RUN_ID}" --start-ip-address "$runner_ip" --end-ip-address "$runner_ip" --output none

      - name: Apply reviewed migrations
        if: ${{ ! inputs.infrastructure_only }}
        run: release/efbundle --connection "$DATABASE_MIGRATION_CONNECTION_STRING"

      - name: Deploy and verify API
        if: ${{ ! inputs.infrastructure_only }}
        shell: bash
        run: |
          az webapp deploy --resource-group "$AZURE_RESOURCE_GROUP" --name "${{ steps.infrastructure.outputs.apiappname }}" --src-path release/api.zip --type zip
          bash scripts/smoke-tests/check-api.sh "${{ steps.infrastructure.outputs.apiurl }}"

      - name: Bootstrap first SuperAdmin
        if: ${{ ! inputs.infrastructure_only && inputs.bootstrap_admin }}
        shell: bash
        run: |
          mkdir -p /tmp/el1te-api && unzip -q release/api.zip -d /tmp/el1te-api
          ASPNETCORE_ENVIRONMENT=Production ConnectionStrings__DefaultConnection="$DATABASE_MIGRATION_CONNECTION_STRING" \
            Jwt__Issuer="${{ steps.infrastructure.outputs.apiurl }}" Jwt__Audience="${{ steps.infrastructure.outputs.weburl }}" Jwt__ExpiresMinutes=60 Jwt__Key="$(cat /tmp/jwt)" \
            Cors__AllowedOrigins__0="${{ steps.infrastructure.outputs.weburl }}" MediaStorage__Provider=AzureBlob \
            MediaStorage__BlobServiceUri="https://invalid.blob.core.windows.net" MediaStorage__ContainerName=media MediaStorage__PublicBaseUrl="${{ steps.infrastructure.outputs.apiurl }}" MediaStorage__MaxFileSizeBytes=10485760 \
            BootstrapAdmin__Email="$BOOTSTRAP_ADMIN_EMAIL" BootstrapAdmin__Password="$BOOTSTRAP_ADMIN_PASSWORD" \
            BootstrapAdmin__FirstName="$BOOTSTRAP_ADMIN_FIRST_NAME" BootstrapAdmin__LastName="$BOOTSTRAP_ADMIN_LAST_NAME" \
            dotnet /tmp/el1te-api/El1teSpr1ntTrack.Api.dll --bootstrap-admin

      - name: Deploy and verify web
        if: ${{ ! inputs.infrastructure_only }}
        shell: bash
        run: |
          az webapp deploy --resource-group "$AZURE_RESOURCE_GROUP" --name "${{ steps.infrastructure.outputs.webappname }}" --src-path release/web.zip --type zip
          bash scripts/smoke-tests/check-web.sh "${{ steps.infrastructure.outputs.weburl }}"

      - name: Deployment summary
        if: ${{ ! inputs.infrastructure_only }}
        run: |
          echo "## Azure demo deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ steps.release.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "API: ${{ steps.infrastructure.outputs.apiurl }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Web: ${{ steps.infrastructure.outputs.weburl }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Remove temporary SQL firewall access
        if: ${{ always() && ! inputs.infrastructure_only && steps.infrastructure.outcome == 'success' }}
        shell: bash
        run: |
          az sql server firewall-rule delete --resource-group "$AZURE_RESOURCE_GROUP" --server "${{ steps.infrastructure.outputs.sqlservername }}" \
            --name "github-actions-${GITHUB_RUN_ID}" --yes --output none 2>/dev/null || true
