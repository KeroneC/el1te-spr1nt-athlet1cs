name: Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "docs/**"
      - "infra/**"
      - "scripts/**"
      - ".github/**"
      - "global.json"
      - "NuGet.Config"
      - "Directory.Build.*"
      - "README.md"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "docs/**"
      - "infra/**"
      - "scripts/**"
      - ".github/**"
      - "global.json"
      - "NuGet.Config"
      - "Directory.Build.*"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore apps/api/El1teSpr1ntTrack.sln --configfile NuGet.Config

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.9

      - name: Build Release
        run: dotnet build apps/api/El1teSpr1ntTrack.sln --configuration Release --no-restore

      - name: Run unit tests
        run: >-
          dotnet test apps/api/tests/El1teSpr1ntTrack.UnitTests/El1teSpr1ntTrack.UnitTests.csproj
          --configuration Release --no-build --no-restore
          --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

      - name: Run integration tests
        run: >-
          dotnet test apps/api/tests/El1teSpr1ntTrack.IntegrationTests/El1teSpr1ntTrack.IntegrationTests.csproj
          --configuration Release --no-build --no-restore
          --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults

      - name: Check for pending EF Core model changes
        run: >-
          dotnet ef migrations has-pending-model-changes
          --project apps/api/src/El1teSpr1ntTrack.Infrastructure/El1teSpr1ntTrack.Infrastructure.csproj
          --startup-project apps/api/src/El1teSpr1ntTrack.Api/El1teSpr1ntTrack.Api.csproj
          --configuration Release --no-build

      - name: Publish API artifact
        run: >-
          dotnet publish apps/api/src/El1teSpr1ntTrack.Api/El1teSpr1ntTrack.Api.csproj
          --configuration Release --runtime linux-x64 --self-contained false --output artifacts/api

      - name: Build EF Core migration bundle
        run: bash scripts/artifacts/build-migration-bundle.sh artifacts/database/efbundle

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-linux-x64
          path: artifacts/api
          retention-days: 7

      - name: Upload migration bundle
        uses: actions/upload-artifact@v7
        with:
          name: database-migration-linux-x64
          path: artifacts/database/efbundle
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    env:
      API_BASE_URL: https://api.example.invalid
      SITE_URL: https://el1tesprint-demo-neauu2-web.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build production application
        run: npm run build

      - name: Stage standalone deployment artifact
        working-directory: ${{ github.workspace }}
        run: bash scripts/artifacts/build-web-artifact.sh apps/web artifacts/web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-standalone
          path: artifacts/web
          include-hidden-files: true
          retention-days: 7

  end-to-end:
    name: End-to-End
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.9

      - name: Restore backend
        run: dotnet restore apps/api/El1teSpr1ntTrack.sln --configfile NuGet.Config

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install chromium

      - name: Run cross-stack browser test
        working-directory: apps/web
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate documentation links and paths
        shell: pwsh
        run: ./scripts/validation/validate-docs.ps1

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-artifacts:
    name: Immutable Release Artifacts
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [backend, frontend, end-to-end, documentation, secret-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Download API
        uses: actions/download-artifact@v8
        with: { name: api-linux-x64, path: release/api }
      - name: Download web
        uses: actions/download-artifact@v8
        with: { name: web-standalone, path: release/web }
      - name: Download migration bundle
        uses: actions/download-artifact@v8
        with: { name: database-migration-linux-x64, path: release/database }
      - name: Package and checksum release
        shell: bash
        run: |
          test -f release/web/apps/web/.next/BUILD_ID
          (cd release/api && zip -qr ../api.zip .)
          (cd release/web && zip -qr ../web.zip .)
          unzip -Z1 release/web.zip | grep -Fxq 'apps/web/.next/BUILD_ID'
          mv release/database/efbundle release/efbundle
          chmod +x release/efbundle
          (cd release && sha256sum api.zip web.zip efbundle > SHA256SUMS)
          jq -n --arg sha "$GITHUB_SHA" --arg run "$GITHUB_RUN_ID" \
            '{commitSha:$sha,ciRunId:$run,createdAt:(now|todate)}' > release/manifest.json
          rm -rf release/api release/web release/database
      - name: Upload immutable release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.sha }}
          path: release
          retention-days: 30
